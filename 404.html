<!DOCTYPE html>
<html>
<head>
    <title>Camila Cell Store</title>
    <script>
        // Redireciona para a página inicial
        var path = window.location.pathname;
        var repo = '/Camila-Cell-Store';
        
        // Remove o repositório do path
        if (path.startsWith(repo + '/')) {
            path = path.substring(repo.length);
        }
        
        // Se não for a raiz, redireciona para a raiz
        if (path !== '/' && path !== '') {
            window.location.replace(repo + '/');
        }
    </script>
</head>
<body>
    <p>Redirecionando...</p>
</body>
</html>
